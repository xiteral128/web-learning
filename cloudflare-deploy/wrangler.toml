name = "taobao-fullstack"
main = "worker.js"
compatibility_date = "2025-12-23"

# 部署目标
workers_dev = true
route = "taobao.yourdomain.com/*"  # 修改为你的域名

# KV命名空间配置（用于存储静态文件）
kv_namespaces = [
  { binding = "STATIC_ASSETS", id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
]

# 环境变量
[vars]
API_VERSION = "1.0.0"
ENVIRONMENT = "production"
JWT_SECRET = "your-jwt-secret-key-change-in-production"

# 部署配置
[build]
command = "echo 'Building for Cloudflare Workers...'"

[build.upload]
format = "service-worker"

# 日志配置
[logpush]
enabled = true

# 限制配置
[limits]
cpu_ms = 50

# 触发器配置
[triggers]
crons = []

# 路由配置（如果使用自定义域名）
[[routes]]
pattern = "taobao.yourdomain.com/*"
zone_name = "yourdomain.com"

# 开发环境覆盖
[env.dev]
name = "taobao-fullstack-dev"
workers_dev = true
vars = { ENVIRONMENT = "development" }

[env.staging]
name = "taobao-fullstack-staging"
route = "staging-taobao.yourdomain.com/*"
vars = { ENVIRONMENT = "staging" }

[env.production]
name = "taobao-fullstack"
route = "taobao.yourdomain.com/*"
vars = { ENVIRONMENT = "production" }